<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>SafeCity | Panel de Control Local</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-950 text-slate-200 overflow-hidden">

    <!-- =================================================
         ENCABEZADO
    ================================================== -->
    <header
        class="h-16 border-b border-slate-800 bg-slate-900
               flex items-center justify-between px-6"
    >
        <div>
            <h1
                class="text-blue-500 font-bold tracking-widest text-xl"
            >
                SAFECITY
            </h1>

            <p
                class="text-[10px] text-slate-500 uppercase font-semibold"
            >
                Smart Security System v1.0
            </p>
        </div>

        <div class="flex items-center gap-4">

            <div class="text-right">
                <p
                    id="current-time"
                    class="text-sm font-mono"
                >
                    00:00:00
                </p>

                <p
                    id="connection-status"
                    class="text-[9px] text-yellow-500"
                >
                    COMPROBANDO CONEXIÓN
                </p>
            </div>

            <button
                class="bg-red-600 hover:bg-red-700 text-white
                       text-xs font-bold py-2 px-4 rounded-full
                       transition-all animate-pulse"
            >
                PÁNICO
            </button>

        </div>
    </header>

    <!-- =================================================
         CONTENIDO PRINCIPAL
    ================================================== -->
    <div class="flex h-[calc(100vh-64px)]">

        <!-- =============================================
             PANEL IZQUIERDO
        ============================================== -->
        <aside
            class="w-72 border-r border-slate-800 bg-slate-900/50
                   p-4 flex flex-col justify-between"
        >

            <div>
                <h2
                    class="text-[10px] font-bold text-slate-500
                           mb-6 tracking-widest"
                >
                    CONTROL DE CÁMARA
                </h2>

                <div
                    class="flex flex-col items-center justify-center
                           p-4 bg-slate-900 border border-slate-800
                           rounded-lg h-60 relative"
                >

                    <p
                        class="text-[10px] text-slate-500 mb-4
                               uppercase tracking-wider font-semibold"
                    >
                        Joystick Pan & Tilt
                    </p>

                    <div
                        id="joystick-boundary"
                        class="w-32 h-32 rounded-full bg-slate-950
                               border border-slate-750 flex items-center
                               justify-center relative touch-none"
                    >
                        <div
                            id="joystick-stick"
                            class="w-12 h-12 rounded-full bg-blue-600
                                   shadow-[0_0_15px_#2563eb]
                                   cursor-pointer absolute"
                        ></div>
                    </div>

                    <p
                        class="text-xs text-blue-500 mt-4
                               font-mono font-bold"
                    >
                        X:
                        <span id="val-x">0</span>

                        |

                        Y:
                        <span id="val-y">0</span>
                    </p>

                </div>
            </div>

            <div
                class="p-3 bg-slate-900 border border-slate-800
                       rounded-lg"
            >
                <p
                    class="text-[10px] text-slate-500 uppercase
                           font-bold tracking-wider mb-1"
                >
                    Servidor de cámara
                </p>

                <p
                    id="server-status"
                    class="text-xs font-mono text-yellow-400"
                >
                    CONECTANDO...
                </p>
            </div>

        </aside>

        <!-- =============================================
             VIDEO CENTRAL
        ============================================== -->
        <main
            class="flex-1 p-6 flex items-center justify-center
                   bg-black/20"
        >
            <div
                class="w-full max-w-4xl aspect-video
                       border border-slate-800 bg-slate-900
                       rounded-lg relative overflow-hidden group"
            >

                <div
                    class="absolute top-0 left-0 w-full p-3
                           bg-gradient-to-b from-black/80
                           to-transparent z-10 flex justify-between
                           items-center"
                >
                    <span
                        class="text-[10px] font-bold bg-blue-600
                               px-2 py-0.5 rounded"
                    >
                        CAM 01 - ENTRADA
                    </span>

                    <span
                        id="python-status"
                        class="text-[10px] text-yellow-400
                               font-mono tracking-wider"
                    >
                        CONECTANDO CON PYTHON...
                    </span>
                </div>

                <img
                    id="video-stream"
                    src=""
                    class="w-full h-full object-cover"
                    alt="Esperando transmisión de Python..."
                >

            </div>
        </main>

        <!-- =============================================
             REGISTRO DE EVENTOS
        ============================================== -->
        <aside
            class="w-72 border-l border-slate-800 bg-slate-900/50
                   p-4 flex flex-col"
        >
            <h2
                class="text-[10px] font-bold text-slate-500
                       mb-4 tracking-widest"
            >
                REGISTRO DE EVENTOS
            </h2>

            <div
                id="alerts-feed"
                class="flex-1 overflow-y-auto space-y-3 pr-2"
            >
                <div
                    class="p-3 bg-slate-900 border border-slate-700
                           rounded-lg text-xs text-slate-400"
                >
                    Esperando detección facial...
                </div>
            </div>
        </aside>

    </div>

    <!-- Tu archivo JavaScript original -->
    <script src="script.js"></script>

    <!-- =================================================
         CONEXIÓN CON PYTHON Y CLOUDFLARE
    ================================================== -->
    <script>

        // Dirección pública creada por Cloudflare Tunnel.
        // No colocar una barra "/" al final.
        const SERVIDOR_SAFECITY =
            "https://civil-november-oasis-random.trycloudflare.com";

        const videoStream =
            document.getElementById("video-stream");

        const serverStatus =
            document.getElementById("server-status");

        const pythonStatus =
            document.getElementById("python-status");

        const connectionStatus =
            document.getElementById("connection-status");

        const alertsFeed =
            document.getElementById("alerts-feed");

        let ultimoEvento = "";

        // =================================================
        // MOSTRAR VIDEO
        // =================================================
        function conectarVideo() {

            videoStream.src =
                SERVIDOR_SAFECITY +
                "/video_feed?t=" +
                Date.now();

            serverStatus.textContent =
                "SERVIDOR HTTPS ACTIVO";

            serverStatus.className =
                "text-xs font-mono text-green-400";
        }

        // =================================================
        // AGREGAR EVENTO AL PANEL DERECHO
        // =================================================
        function agregarEvento(
            nombre,
            similitud,
            fecha
        ) {

            const evento = document.createElement("div");

            const esDesconocido =
                nombre.toUpperCase() === "DESCONOCIDO";

            if (esDesconocido) {

                evento.className =
                    "p-3 bg-slate-900 border border-red-700 " +
                    "rounded-lg text-xs text-red-300";

            } else {

                evento.className =
                    "p-3 bg-slate-900 border border-green-700 " +
                    "rounded-lg text-xs text-green-300";
            }

            evento.innerHTML = `
                <p class="font-bold uppercase">
                    ${nombre}
                </p>

                <p class="text-[10px] mt-1">
                    Similitud: ${Number(similitud).toFixed(3)}
                </p>

                <p class="text-[9px] text-slate-500 mt-1">
                    ${fecha}
                </p>
            `;

            alertsFeed.prepend(evento);

            // Máximo 20 eventos visibles.
            while (alertsFeed.children.length > 20) {
                alertsFeed.removeChild(
                    alertsFeed.lastChild
                );
            }
        }

        // =================================================
        // CONSULTAR RESULTADO DE RECONOCIMIENTO
        // =================================================
        async function consultarEstado() {

            try {

                const respuesta = await fetch(
                    SERVIDOR_SAFECITY +
                    "/estado?t=" +
                    Date.now(),
                    {
                        cache: "no-store"
                    }
                );

                if (!respuesta.ok) {
                    throw new Error(
                        "HTTP " + respuesta.status
                    );
                }

                const datos = await respuesta.json();

                connectionStatus.textContent =
                    "SISTEMA OPERATIVO";

                connectionStatus.className =
                    "text-[9px] text-green-500";

                pythonStatus.textContent =
                    datos.mensaje || "PYTHON ACTIVO";

                pythonStatus.className =
                    "text-[10px] text-green-400 " +
                    "font-mono tracking-wider";

                if (
                    datos.detectado &&
                    datos.nombre &&
                    datos.fecha
                ) {

                    const identificadorEvento =
                        datos.fecha +
                        "|" +
                        datos.nombre +
                        "|" +
                        datos.similitud;

                    if (
                        identificadorEvento !==
                        ultimoEvento
                    ) {

                        ultimoEvento =
                            identificadorEvento;

                        agregarEvento(
                            datos.nombre,
                            datos.similitud,
                            datos.fecha
                        );
                    }
                }

            } catch (error) {

                connectionStatus.textContent =
                    "SISTEMA DESCONECTADO";

                connectionStatus.className =
                    "text-[9px] text-red-500";

                pythonStatus.textContent =
                    "PYTHON DESCONECTADO";

                pythonStatus.className =
                    "text-[10px] text-red-400 " +
                    "font-mono tracking-wider";

                serverStatus.textContent =
                    "SERVIDOR NO DISPONIBLE";

                serverStatus.className =
                    "text-xs font-mono text-red-400";
            }
        }

        // =================================================
        // INICIO
        // =================================================
        conectarVideo();
        consultarEstado();

        setInterval(
            consultarEstado,
            1000
        );

    </script>

</body>
</html>
